<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OddsTracker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#090910;--bg2:#0f0f18;--bg3:#16161f;--card:#12121a;
  --border:#1e1e2e;--border2:#252535;
  --accent:#4ade80;--accent2:#f97316;--accent3:#60a5fa;
  --red:#f87171;--yellow:#fbbf24;
  --text:#f0f0f8;--text2:#9090b0;--text3:#4a4a68;
  --sidebar-w:260px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}

/* LOGIN */
#login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 20px;position:relative;overflow:hidden}
.login-glow{position:absolute;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,#4ade8012 0%,transparent 70%);top:-120px;left:50%;transform:translateX(-50%);pointer-events:none}
.logo-wrap{display:flex;align-items:center;gap:12px;margin-bottom:36px}
.logo-icon{width:48px;height:48px;background:var(--accent);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px}
.logo-text{font-size:28px;font-weight:800;letter-spacing:-0.5px}
.logo-text span{color:var(--accent)}
.login-card{width:100%;max-width:400px;background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:32px 28px}
.login-h{font-size:22px;font-weight:800;margin-bottom:4px}
.login-s{font-size:13px;color:var(--text2);margin-bottom:28px}
.field-label{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.name-input{width:100%;background:var(--bg2);border:1.5px solid var(--border2);border-radius:10px;color:var(--text);font-family:'Inter',sans-serif;font-size:15px;font-weight:500;padding:13px 16px;outline:none;margin-bottom:22px;transition:border-color .2s}
.name-input:focus{border-color:var(--accent)}
.name-input::placeholder{color:var(--text3)}
.pin-dots{display:flex;gap:10px;justify-content:center;margin-bottom:20px}
.pin-dot{width:56px;height:56px;border-radius:14px;background:var(--bg2);border:1.5px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:28px;color:var(--accent);transition:all .2s}
.pin-dot.filled{border-color:var(--accent);background:#4ade8018}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px}
.num-btn{background:var(--bg3);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-family:'Inter',sans-serif;font-size:22px;font-weight:600;padding:16px;cursor:pointer;transition:all .15s;user-select:none}
.num-btn:hover{background:var(--border2)}
.num-btn:active{transform:scale(.93)}
.num-btn.sm{font-size:12px;color:var(--text2);font-weight:500}
.enter-btn{width:100%;background:var(--accent);border:none;border-radius:12px;color:#000;font-family:'Inter',sans-serif;font-size:15px;font-weight:700;padding:16px;cursor:pointer;transition:all .15s}
.enter-btn:hover{background:#22c55e}
.enter-btn:active{transform:scale(.97)}
.login-err{text-align:center;color:var(--red);font-size:12px;font-weight:500;margin-top:10px;min-height:18px}

/* APP */
#app{display:none;flex-direction:column;min-height:100vh}
.topbar{position:sticky;top:0;z-index:100;background:rgba(9,9,16,.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 20px;height:58px;display:flex;align-items:center;gap:12px}
.tb-logo{font-size:18px;font-weight:800;letter-spacing:-0.3px;white-space:nowrap}
.tb-logo span{color:var(--accent)}
.live-pill{display:flex;align-items:center;gap:5px;background:#4ade8012;border:1px solid #4ade8030;border-radius:20px;padding:3px 10px;font-size:10px;font-weight:700;color:var(--accent);letter-spacing:0.5px}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.icon-btn{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text2);font-size:16px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.icon-btn:hover{border-color:var(--accent);color:var(--accent)}
.icon-btn.spinning{animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.logout-btn{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text2);font-family:'Inter',sans-serif;font-size:12px;font-weight:600;padding:7px 14px;cursor:pointer;transition:all .2s}
.logout-btn:hover{border-color:var(--red);color:var(--red)}
.tb-scraper-info{font-size:11px;color:var(--text3);display:none}
.tb-scraper-info b{color:var(--accent)}

/* LAYOUT */
.app-body{display:flex;flex:1}
.sidebar{display:none}
.content{flex:1;min-width:0;display:flex;flex-direction:column}

/* STATUS BAR */
.status-bar{display:flex;align-items:center;gap:6px;padding:7px 14px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;flex-wrap:wrap}
.status-bar-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;font-weight:700;white-space:nowrap}
.house-pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;border:1px solid var(--border2);color:var(--text3);background:var(--bg3)}
.house-pill.ok{color:var(--accent);border-color:#4ade8040;background:#4ade8010}
.house-pill.fail{color:var(--red);border-color:#f8717130}
.server-info{margin-left:auto;font-size:10px;font-family:'JetBrains Mono',monospace;color:var(--text3);white-space:nowrap}
.server-info.ok{color:var(--accent)}

/* FILTER BAR */
.filter-bar{display:flex;align-items:center;gap:6px;padding:8px 14px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;flex-wrap:wrap}
.filter-chip{background:transparent;border:1.5px solid var(--border2);border-radius:20px;color:var(--text2);font-size:11px;font-weight:600;padding:5px 12px;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;white-space:nowrap}
.filter-chip.active{background:#4ade8015;border-color:var(--accent);color:var(--accent)}
.filter-chip:hover{border-color:var(--text2)}
.profit-filter{display:flex;align-items:center;gap:6px;margin-left:auto}
.profit-filter label{font-size:10px;color:var(--text3);white-space:nowrap}
.profit-filter input{accent-color:var(--accent);width:70px}
.profit-filter span{font-size:11px;font-weight:700;color:var(--accent);font-family:'JetBrains Mono',monospace;min-width:32px}

/* STATS */
.stats-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border-bottom:1px solid var(--border);flex-shrink:0}
.stat{background:var(--bg2);padding:10px;text-align:center}
.stat-n{font-size:20px;font-weight:800;line-height:1;margin-bottom:2px;font-family:'JetBrains Mono',monospace}
.stat-l{font-size:9px;color:var(--text3);font-weight:500;text-transform:uppercase;letter-spacing:0.5px}

/* CARDS */
.main{padding:12px;overflow-y:auto;flex:1}
.cards-grid{display:grid;grid-template-columns:1fr;gap:10px}

/* SUREBET CARD */
.sb-card{background:var(--card);border:1px solid #4ade8040;border-radius:16px;overflow:hidden;cursor:pointer;transition:border-color .15s,box-shadow .15s;box-shadow:0 0 0 1px #4ade8015,0 4px 20px #4ade8008}
.sb-card:hover{border-color:#4ade8070;box-shadow:0 0 0 1px #4ade8030,0 6px 24px #4ade8018}
.sb-card:active{border-color:var(--accent)}
.sb-head{display:flex;align-items:center;gap:8px;padding:10px 14px 8px;border-bottom:1px solid var(--border);background:linear-gradient(90deg,#4ade8008,transparent);flex-wrap:wrap}
.profit-pill{font-size:15px;font-weight:800;font-family:'JetBrains Mono',monospace;padding:4px 12px;border-radius:8px;flex-shrink:0}
.profit-pill.hi{background:#4ade8025;color:#4ade80;border:1px solid #4ade8050}
.profit-pill.md{background:#fbbf2420;color:#fbbf24;border:1px solid #fbbf2440}
.profit-pill.lo{background:#94a3b820;color:#94a3b8;border:1px solid #94a3b840}
.sport-tag{font-size:10px;font-weight:600;color:var(--text3);background:var(--bg3);border-radius:6px;padding:3px 8px;text-transform:uppercase;letter-spacing:0.5px}
.sb-time{font-size:11px;color:var(--text3);margin-left:auto}
.sb-match{padding:10px 14px 2px;font-size:15px;font-weight:700;line-height:1.35}
.sb-type{padding:2px 14px 8px;font-size:11px;color:var(--text3)}
.sb-rows{border-top:1px solid var(--border)}
.sb-row{display:flex;align-items:center;padding:8px 14px;border-bottom:1px solid var(--border);gap:8px}
.sb-row:last-child{border-bottom:none}
.sb-row.best{background:#4ade8008}
.row-house{font-size:12px;font-weight:700;color:var(--accent3);width:90px;flex-shrink:0}
.sb-row.best .row-house{color:var(--accent)}
.row-outcome{font-size:11px;color:var(--text2);flex:1;font-weight:500}
.row-odd{font-size:16px;font-weight:800;font-family:'JetBrains Mono',monospace}
.sb-row.best .row-odd{color:var(--accent)}
.row-stake{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;white-space:nowrap}

/* MATCH CARD */
.match-card{background:var(--card);border:1px solid var(--border2);border-radius:14px;overflow:hidden;cursor:default;transition:border-color .15s}
.match-card:hover{border-color:var(--border)}
.match-head{display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid var(--border)}
.match-title{font-size:13px;font-weight:700;flex:1}
.match-row{display:flex;align-items:center;padding:8px 14px;border-bottom:1px solid var(--border);gap:8px}
.match-row:last-child{border-bottom:none}
.mrow-house{font-size:11px;font-weight:700;color:var(--accent3);width:90px;flex-shrink:0}
.mrow-odds{display:flex;gap:6px;flex:1}
.odd-wrap{flex:1;text-align:center}
.odd-label{font-size:9px;font-weight:600;color:var(--text3);margin-bottom:2px;text-transform:uppercase}
.odd-box{font-size:13px;font-weight:700;font-family:'JetBrains Mono',monospace;padding:4px;border-radius:6px;background:var(--bg3);color:var(--text2)}
.odd-box.best{background:#4ade8015;color:var(--accent);border:1px solid #4ade8030}

/* ESTADOS */
.loading-wrap{padding:60px 24px;display:flex;flex-direction:column;align-items:center;gap:14px;grid-column:1/-1}
.spinner{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
.load-txt{font-size:13px;color:var(--text3);font-weight:500}
.empty-wrap{padding:60px 24px;text-align:center;grid-column:1/-1}
.empty-ico{font-size:44px;margin-bottom:12px}
.empty-t{font-size:15px;font-weight:700;color:var(--text2);margin-bottom:6px}
.empty-s{font-size:12px;color:var(--text3)}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:0;right:0;background:rgba(9,9,16,.97);backdrop-filter:blur(20px);border-top:1px solid var(--border);padding:10px 0 22px;display:flex;justify-content:space-around;z-index:50}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--text3);font-size:10px;font-weight:600;cursor:pointer;padding:0 20px;font-family:'Inter',sans-serif}
.nav-item.active{color:var(--accent)}
.nav-ico{font-size:22px}
@media(max-width:899px){.main{padding-bottom:90px}}

/* MODAL */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal-sheet{background:var(--bg2);border-top:1px solid var(--border2);border-radius:22px 22px 0 0;width:100%;max-width:600px;max-height:92vh;overflow-y:auto;padding:16px 20px 60px;animation:slideUp .22s ease;position:relative}
@keyframes slideUp{from{transform:translateY(100%)}}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.modal-close-btn{display:none;position:absolute;top:14px;right:18px;width:32px;height:32px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text2);font-size:18px;cursor:pointer;align-items:center;justify-content:center;transition:all .15s}
.modal-close-btn:hover{border-color:var(--red);color:var(--red)}
.surebet-alert{background:#4ade8022;border:1.5px solid #4ade8060;border-radius:10px;padding:10px 14px;font-size:15px;font-weight:700;color:var(--accent);text-align:center;margin-bottom:14px}
.modal-match{font-size:19px;font-weight:800;margin-bottom:3px;line-height:1.3}
.modal-sub{font-size:12px;color:var(--text3);margin-bottom:16px}

/* CALCULADORA MODAL */
.calc-header{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);margin-bottom:2px}
.calc-header div{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px}
.calc-row{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:8px;padding:9px 0;border-bottom:1px solid var(--border);align-items:center}
.calc-house{font-size:12px;font-weight:700;color:var(--accent3)}
.calc-outcome{font-size:11px;color:var(--text2)}
.calc-odd{font-size:15px;font-weight:800;font-family:'JetBrains Mono',monospace;color:var(--accent)}
.calc-stake-input{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;padding:7px 8px;outline:none;width:100%;transition:border-color .2s}
.calc-stake-input:focus{border-color:var(--accent)}
.calc-footer{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:8px;padding:10px 0;border-top:2px solid var(--border2);margin-top:4px;align-items:center}
.calc-profit{font-size:16px;font-weight:800;font-family:'JetBrains Mono',monospace}
.calc-profit.pos{color:var(--accent)}
.calc-profit.neg{color:var(--red)}
.calc-controls{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.calc-total-wrap{display:flex;align-items:center;gap:8px}
.calc-total-label{font-size:13px;color:var(--text2);white-space:nowrap}
.calc-total-input{background:var(--bg3);border:1.5px solid var(--border2);border-radius:10px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:700;padding:9px 12px;outline:none;width:120px;transition:border-color .2s}
.calc-total-input:focus{border-color:var(--accent)}
.round-btn{background:var(--bg3);border:1px solid var(--border2);border-radius:8px;color:var(--text2);font-family:'Inter',sans-serif;font-size:11px;font-weight:600;padding:6px 12px;cursor:pointer;margin-left:auto;transition:all .2s}
.round-btn:hover{border-color:var(--accent);color:var(--accent)}

/* SCRAPER STATUS PANEL */
.scraper-card{background:var(--card);border:1px solid var(--border2);border-radius:12px;padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.scraper-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.scraper-dot.ok{background:var(--accent)}
.scraper-dot.fail{background:var(--red)}
.scraper-name{font-size:14px;font-weight:700;flex:1}
.scraper-count{font-size:12px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.scraper-status-txt{font-size:11px;font-weight:600}
.scraper-status-txt.ok{color:var(--accent)}
.scraper-status-txt.fail{color:var(--red)}

/* DESKTOP */
@media(min-width:600px){.cards-grid{grid-template-columns:repeat(2,1fr);gap:12px}}
@media(min-width:900px){
  .topbar{padding:0 28px;height:62px}
  .tb-scraper-info{display:block}
  #app{height:100vh;overflow:hidden}
  .app-body{height:calc(100vh - 62px);overflow:hidden}
  .sidebar{display:flex;flex-direction:column;width:var(--sidebar-w);flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);overflow-y:auto;height:100%;padding-bottom:20px}
  .sidebar-section{padding:16px 14px 0}
  .sidebar-label{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;padding:0 2px}
  .sd-btn{display:flex;align-items:center;gap:5px;background:transparent;border:1.5px solid var(--border2);border-radius:10px;color:var(--text2);font-size:13px;font-weight:600;padding:9px 12px;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;width:100%;margin-bottom:5px}
  .sd-btn.active{background:#4ade8015;border-color:var(--accent);color:var(--accent)}
  .sd-btn:hover{border-color:var(--text2)}
  .sidebar-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:14px}
  .sidebar-stat{background:var(--card);border:1px solid var(--border2);border-radius:10px;padding:10px 12px;text-align:center}
  .sidebar-stat-n{font-size:20px;font-weight:800;font-family:'JetBrains Mono',monospace;margin-bottom:2px}
  .sidebar-stat-l{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px}
  .sidebar-fbar{padding:0 14px 14px}
  .sidebar-fbar-label{font-size:11px;color:var(--text3);margin-bottom:8px;font-weight:500}
  .sidebar-fbar input{width:100%;accent-color:var(--accent)}
  .sidebar-fbar-val{font-size:13px;font-weight:700;color:var(--accent);font-family:'JetBrains Mono',monospace;margin-top:4px}
  .content{overflow:hidden;display:flex;flex-direction:column}
  .main{padding:20px;overflow-y:auto;flex:1;padding-bottom:20px}
  .cards-grid{grid-template-columns:repeat(2,1fr);gap:14px}
  .stats-bar{display:none}
  .bnav{display:none}
  .modal-bg{align-items:center}
  .modal-sheet{border-radius:18px;border:1px solid var(--border2);border-top:1px solid var(--border2);max-height:88vh;max-width:640px;animation:fadeScale .2s ease}
  @keyframes fadeScale{from{opacity:0;transform:scale(.96)}}
  .modal-handle{display:none}
  .modal-close-btn{display:flex}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-glow"></div>
  <div class="logo-wrap">
    <div class="logo-icon">⚡</div>
    <div class="logo-text">Odds<span>Track</span></div>
  </div>
  <div class="login-card">
    <div class="login-h">Bienvenido</div>
    <div class="login-s">Ingresa tus datos para continuar</div>
    <div class="field-label">Nombre</div>
    <input class="name-input" id="uname" type="text" placeholder="Tu nombre..." autocomplete="off"/>
    <div class="field-label">PIN de acceso</div>
    <div class="pin-dots">
      <div class="pin-dot" id="pd0">·</div>
      <div class="pin-dot" id="pd1">·</div>
      <div class="pin-dot" id="pd2">·</div>
      <div class="pin-dot" id="pd3">·</div>
    </div>
    <div class="numpad">
      <button class="num-btn" onclick="pinPress('1')">1</button>
      <button class="num-btn" onclick="pinPress('2')">2</button>
      <button class="num-btn" onclick="pinPress('3')">3</button>
      <button class="num-btn" onclick="pinPress('4')">4</button>
      <button class="num-btn" onclick="pinPress('5')">5</button>
      <button class="num-btn" onclick="pinPress('6')">6</button>
      <button class="num-btn" onclick="pinPress('7')">7</button>
      <button class="num-btn" onclick="pinPress('8')">8</button>
      <button class="num-btn" onclick="pinPress('9')">9</button>
      <button class="num-btn sm" onclick="pinPress('clear')">Borrar</button>
      <button class="num-btn" onclick="pinPress('0')">0</button>
      <button class="num-btn sm" onclick="pinPress('del')">⌫</button>
    </div>
    <button class="enter-btn" onclick="doLogin()">Entrar →</button>
    <div class="login-err" id="lerr"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="tb-logo">Odds<span>Track</span></div>
    <div class="live-pill"><div class="live-dot"></div>LIVE</div>
    <div class="tb-scraper-info">⚡ Scraper Propio · <b id="tb-houses">Cargando...</b></div>
    <div class="tb-right">
      <div class="icon-btn" id="rbtn" onclick="onRefresh()" title="Actualizar">↻</div>
      <button class="logout-btn" onclick="doLogout()">Salir</button>
    </div>
  </div>

  <div class="app-body">
    <!-- SIDEBAR PC -->
    <div class="sidebar">
      <div class="sidebar-section">
        <div class="sidebar-label">Vista</div>
        <button class="sd-btn active" id="sd-surebets" onclick="setView('surebets',this)">⚡ Surebets</button>
        <button class="sd-btn" id="sd-partidos" onclick="setView('partidos',this)">📊 Todos los partidos</button>
        <button class="sd-btn" id="sd-estado" onclick="setView('estado',this)">🟢 Estado scrapers</button>
      </div>
      <div class="sidebar-stats">
        <div class="sidebar-stat"><div class="sidebar-stat-n" id="sn-sb2">—</div><div class="sidebar-stat-l">Surebets</div></div>
        <div class="sidebar-stat"><div class="sidebar-stat-n" id="sn-part2">—</div><div class="sidebar-stat-l">Partidos</div></div>
        <div class="sidebar-stat" style="grid-column:1/-1"><div class="sidebar-stat-n" style="color:var(--accent)" id="sn-best2">—</div><div class="sidebar-stat-l">Mejor ganancia</div></div>
      </div>
      <div class="sidebar-fbar">
        <div class="sidebar-fbar-label">Ganancia mínima:</div>
        <input type="range" min="0" max="10" value="0" step="0.1" id="slider-pc" oninput="onSlider(this)"/>
        <div class="sidebar-fbar-val" id="fval-pc">Todos</div>
      </div>
    </div>

    <!-- CONTENT -->
    <div class="content">
      <div class="status-bar" id="status-bar">
        <span class="status-bar-label">Casas:</span>
        <div id="house-pills" style="display:flex;gap:4px;flex-wrap:wrap"></div>
        <span class="server-info" id="server-info">Conectando...</span>
      </div>
      <div class="filter-bar">
        <button class="filter-chip active" onclick="setView('surebets',this)" data-v="surebets">⚡ Surebets</button>
        <button class="filter-chip" onclick="setView('partidos',this)" data-v="partidos">📊 Partidos</button>
        <button class="filter-chip" onclick="setView('estado',this)" data-v="estado">🟢 Estado</button>
        <div class="profit-filter">
          <label>Mín %</label>
          <input type="range" min="0" max="10" value="0" step="0.1" id="slider-mob" oninput="onSlider(this)"/>
          <span id="fval-mob">0%</span>
        </div>
      </div>
      <div class="stats-bar">
        <div class="stat"><div class="stat-n" id="sn-sb">—</div><div class="stat-l">Surebets</div></div>
        <div class="stat"><div class="stat-n" id="sn-part">—</div><div class="stat-l">Partidos</div></div>
        <div class="stat"><div class="stat-n" style="color:var(--accent)" id="sn-best">—</div><div class="stat-l">Mejor %</div></div>
      </div>
      <div class="main">
        <div class="cards-grid" id="main-list">
          <div class="loading-wrap">
            <div class="spinner"></div>
            <div class="load-txt">Conectando con Render...</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="bnav">
    <button class="nav-item active" id="bnav-surebets" onclick="setView('surebets',this)"><span class="nav-ico">⚡</span>Surebets</button>
    <button class="nav-item" id="bnav-partidos" onclick="setView('partidos',this)"><span class="nav-ico">📊</span>Partidos</button>
    <button class="nav-item" id="bnav-estado" onclick="setView('estado',this)"><span class="nav-ico">🟢</span>Estado</button>
  </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="mbg" onclick="if(event.target===this)closeMod()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <button class="modal-close-btn" onclick="closeMod()">✕</button>
    <div id="mbody"></div>
  </div>
</div>

<script>
// Rutas relativas: funciona en Render, localhost, o cualquier dominio
const RENDER_URL = '';
const VALID_PIN  = '1991';
const REFRESH_MS = 90000;

let currentView = 'surebets';
let minProfit   = 0;
let allSurebets = [];
let allPartidos = [];
let allScrapers = [];
let sbFiltered  = [];
let userName    = '';
let refreshTimer = null;
let pin = '';

// ── LOGIN ─────────────────────────────────────────────────────────────────────
function pinPress(n) {
  if (n === 'clear') pin = '';
  else if (n === 'del') pin = pin.slice(0,-1);
  else if (pin.length < 4) pin += n;
  for (let i=0;i<4;i++) {
    const d = document.getElementById('pd'+i);
    d.textContent = i < pin.length ? '●' : '·';
    d.classList.toggle('filled', i < pin.length);
  }
  document.getElementById('lerr').textContent = '';
  if (pin.length === 4) setTimeout(doLogin, 120);
}

function doLogin() {
  const name = document.getElementById('uname').value.trim();
  if (!name) { document.getElementById('lerr').textContent = 'Ingresa tu nombre'; return; }
  if (pin !== VALID_PIN) {
    document.getElementById('lerr').textContent = 'PIN incorrecto';
    pin = '';
    for (let i=0;i<4;i++){const d=document.getElementById('pd'+i);d.textContent='·';d.classList.remove('filled');}
    return;
  }
  userName = name;
  try { localStorage.setItem('ot_user', name); } catch(_) {}
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  initApp();
}

function doLogout() {
  try { localStorage.removeItem('ot_user'); } catch(_) {}
  if (refreshTimer) clearInterval(refreshTimer);
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  pin = '';
  for (let i=0;i<4;i++){const d=document.getElementById('pd'+i);d.textContent='·';d.classList.remove('filled');}
  document.getElementById('uname').value = '';
}

window.addEventListener('DOMContentLoaded', () => {
  try {
    const saved = localStorage.getItem('ot_user');
    if (saved) {
      userName = saved;
      document.getElementById('uname').value = saved;
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').style.display = 'flex';
      initApp();
    }
  } catch(_) {}
});

// ── APP ───────────────────────────────────────────────────────────────────────
function initApp() {
  loadData();
  refreshTimer = setInterval(loadData, REFRESH_MS);
}

async function loadData() {
  document.getElementById('rbtn').classList.add('spinning');
  try {
    const [sbRes, stRes] = await Promise.allSettled([
      fetch(`${RENDER_URL}/api/surebets`, {signal: AbortSignal.timeout(15000)}).then(r=>r.json()),
      fetch(`${RENDER_URL}/api/status`,   {signal: AbortSignal.timeout(10000)}).then(r=>r.json()),
    ]);

    if (sbRes.status === 'fulfilled') {
      allSurebets = sbRes.value.surebets || [];
      // Intentar cargar partidos
      try {
        const od = await fetch(`${RENDER_URL}/api/odds`, {signal: AbortSignal.timeout(12000)});
        const odData = await od.json();
        allPartidos = odData.matches || odData.odds || [];
      } catch(_) { allPartidos = []; }
    }

    if (stRes.status === 'fulfilled') {
      allScrapers = stRes.value.casas || [];
      updateStatusBar(stRes.value);
    }

    updateStats();
    renderView();
  } catch(err) {
    showMsg('⚠️', 'Sin conexión', 'No se pudo conectar con Render. ¿Está dormido? Espera 30s y recarga.');
  }
  document.getElementById('rbtn').classList.remove('spinning');
}

function onRefresh() {
  if (refreshTimer) clearInterval(refreshTimer);
  loadData();
  refreshTimer = setInterval(loadData, REFRESH_MS);
}

// ── STATUS BAR ────────────────────────────────────────────────────────────────
function updateStatusBar(st) {
  const casas = st.casas || [];
  const pills = document.getElementById('house-pills');
  pills.innerHTML = casas.map(c => {
    const ok = c.status === 'ok' || (c.matches > 0);
    return `<span class="house-pill ${ok?'ok':'fail'}">${c.name||c.scraper} ${ok?(c.matches||'✓'):'✗'}</span>`;
  }).join('');
  const ok = casas.filter(c => c.status==='ok' || c.matches>0).length;
  const info = document.getElementById('server-info');
  info.textContent = `🟢 Render · ${ok}/${casas.length} activas · ${new Date(st.ts||Date.now()).toLocaleTimeString('es-PE')}`;
  info.className = 'server-info' + (ok>0?' ok':'');
  const tbh = document.getElementById('tb-houses');
  if (tbh) tbh.textContent = casas.filter(c=>c.status==='ok'||c.matches>0).map(c=>c.name||c.scraper).join(' · ') || 'Cargando...';
}

// ── STATS ─────────────────────────────────────────────────────────────────────
function updateStats() {
  sbFiltered = allSurebets.filter(s=>(s.profitPct||0)>=minProfit).sort((a,b)=>(b.profitPct||0)-(a.profitPct||0));
  const best = sbFiltered.length ? '+'+sbFiltered[0].profitPct.toFixed(2)+'%' : '—';
  const ids = ['sn-sb','sn-sb2']; ids.forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=allSurebets.length;});
  const idp = ['sn-part','sn-part2']; idp.forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=allPartidos.length||allSurebets.length+'★';});
  const idb = ['sn-best','sn-best2']; idb.forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=best;});
}

// ── VISTAS ────────────────────────────────────────────────────────────────────
function setView(view, btn) {
  currentView = view;
  document.querySelectorAll('.filter-chip,.sd-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const sd = document.getElementById('sd-'+view);
  if (sd) sd.classList.add('active');
  const bn = document.getElementById('bnav-'+view);
  if (bn) bn.classList.add('active');
  renderView();
}

function onSlider(el) {
  minProfit = parseFloat(el.value);
  const label = minProfit===0 ? 'Todos' : '+'+minProfit.toFixed(1)+'%';
  ['fval-pc','fval-mob'].forEach(id=>{const e=document.getElementById(id);if(e)e.textContent=label;});
  document.getElementById('slider-pc').value = minProfit;
  document.getElementById('slider-mob').value = minProfit;
  updateStats();
  renderView();
}

function renderView() {
  if      (currentView==='surebets') renderSurebets();
  else if (currentView==='partidos') renderPartidos();
  else if (currentView==='estado')   renderEstado();
}

// ── SUREBETS ──────────────────────────────────────────────────────────────────
function renderSurebets() {
  const list = document.getElementById('main-list');
  if (!sbFiltered.length) {
    showMsg(allSurebets.length?'🔍':'⚡', allSurebets.length?'Sin surebets con ese filtro':'Escaneando mercados...', allSurebets.length?'Baja el filtro de ganancia mínima':'El scanner busca oportunidades cada 60s');
    return;
  }
  list.innerHTML = sbFiltered.map((sb,i) => {
    const profit = (sb.profitPct||0).toFixed(2);
    const cls = sb.profitPct>=2?'hi':sb.profitPct>=0.5?'md':'lo';
    const bets = sb.bets||sb.realBets||[];
    const time = sb.startTime ? new Date(sb.startTime).toLocaleString('es-PE',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) : '';
    const OUTCOMES = {home:'Local',draw:'Empate',away:'Visita'};
    const rows = bets.map((b,bi) => {
      const stk = (b.realStake||b.stake) ? `S/${Number(b.realStake||b.stake).toFixed(0)}` : '';
      return `<div class="sb-row${bi===0?' best':''}">
        <div class="row-house">${b.bookmaker||'?'}</div>
        <div class="row-outcome">${OUTCOMES[b.outcome]||b.outcome}</div>
        <div class="row-odd">${Number(b.odd||0).toFixed(2)}</div>
        <div class="row-stake">${stk}</div>
      </div>`;
    }).join('');
    return `<div class="sb-card" onclick="openSurebet(${i})">
      <div class="sb-head">
        <div class="profit-pill ${cls}">+${profit}%</div>
        <div class="sport-tag">${sb.sport||'fútbol'}</div>
        <div class="sb-time">${time}</div>
      </div>
      <div class="sb-match">${sb.teams?.home||'?'} vs ${sb.teams?.away||'?'}</div>
      <div class="sb-type">${sb.type||'3-way'} · ${bets.length} apuestas · ret. garantizado S/${Number(sb.guaranteedReturn||0).toFixed(0)}</div>
      <div class="sb-rows">${rows}</div>
    </div>`;
  }).join('');
}

// ── PARTIDOS ──────────────────────────────────────────────────────────────────
function renderPartidos() {
  const list = document.getElementById('main-list');
  const source = allPartidos.length ? allPartidos : allSurebets.flatMap(sb => (sb.bets||sb.realBets||[]).map(b=>({...b, home:sb.teams?.home, away:sb.teams?.away, sport:sb.sport, startTime:sb.startTime})));

  if (!source.length) {
    showMsg('📊','Sin partidos','El scanner aún está cargando datos');
    return;
  }

  // Agrupar por partido
  const matchMap = {};
  if (allPartidos.length) {
    allPartidos.slice(0,150).forEach(m => {
      const key = `${m.home||m.homeName}|${m.away||m.awayName}`;
      if (!matchMap[key]) matchMap[key] = {home:m.home||m.homeName||'?', away:m.away||m.awayName||'?', sport:m.sport, startTime:m.startTime, houses:{}};
      const h = m.bookmaker||m.source||'?';
      matchMap[key].houses[h] = m.odds||{};
    });
  } else {
    allSurebets.forEach(sb => {
      const key = `${sb.teams?.home}|${sb.teams?.away}`;
      if (!matchMap[key]) matchMap[key] = {home:sb.teams?.home||'?', away:sb.teams?.away||'?', sport:sb.sport, startTime:sb.startTime, houses:{}};
      (sb.bets||sb.realBets||[]).forEach(b => {
        const h = b.bookmaker||'?';
        if (!matchMap[key].houses[h]) matchMap[key].houses[h] = {};
        matchMap[key].houses[h][b.outcome] = b.odd;
      });
    });
  }

  const matches = Object.values(matchMap);
  list.innerHTML = matches.map(m => {
    const houses = Object.entries(m.houses);
    return `<div class="match-card">
      <div class="match-head">
        <div class="match-title">${m.home} vs ${m.away}</div>
        <div class="sport-tag">${m.sport||'fútbol'}</div>
      </div>
      ${houses.map(([h, odds]) => `<div class="match-row">
        <div class="mrow-house">${h}</div>
        <div class="mrow-odds">
          ${odds.home ? `<div class="odd-wrap"><div class="odd-label">Local</div><div class="odd-box">${Number(odds.home).toFixed(2)}</div></div>` : ''}
          ${odds.draw ? `<div class="odd-wrap"><div class="odd-label">Empate</div><div class="odd-box">${Number(odds.draw).toFixed(2)}</div></div>` : ''}
          ${odds.away ? `<div class="odd-wrap"><div class="odd-label">Visita</div><div class="odd-box">${Number(odds.away).toFixed(2)}</div></div>` : ''}
        </div>
      </div>`).join('')}
    </div>`;
  }).join('') || `<div class="empty-wrap"><div class="empty-ico">📊</div><div class="empty-t">Sin partidos</div></div>`;
}

// ── ESTADO SCRAPERS ───────────────────────────────────────────────────────────
function renderEstado() {
  const list = document.getElementById('main-list');
  if (!allScrapers.length) {
    showMsg('🟢','Cargando estado...','Conectando con el servidor');
    return;
  }
  list.innerHTML = `<div style="grid-column:1/-1">
    ${allScrapers.map(c => {
      const ok = c.status==='ok' || c.matches>0;
      return `<div class="scraper-card">
        <div class="scraper-dot ${ok?'ok':'fail'}"></div>
        <div class="scraper-name">${c.name||c.scraper||'?'}</div>
        <div class="scraper-count">${c.matches||0} partidos</div>
        <div class="scraper-status-txt ${ok?'ok':'fail'}">${ok?'Activo':'Falla'}</div>
      </div>`;
    }).join('')}
    <div style="padding:12px;text-align:center;font-size:11px;color:var(--text3)">Actualización cada 90 segundos · <span style="color:var(--accent)" onclick="onRefresh()" style="cursor:pointer">↻ Actualizar ahora</span></div>
  </div>`;
}

// ── MODAL SUREBET ─────────────────────────────────────────────────────────────
function openSurebet(idx) {
  const sb = sbFiltered[idx];
  if (!sb) return;
  const bets = sb.bets||sb.realBets||[];
  const odds = bets.map(b=>Number(b.odd||2));
  const profit = (sb.profitPct||0).toFixed(2);
  const OUTCOMES = {home:'Local',draw:'Empate',away:'Visita'};
  const total = 100;
  const inv = odds.reduce((s,o)=>s+1/o,0);
  const stakes0 = odds.map(o=>parseFloat((1/o/inv*total).toFixed(2)));

  document.getElementById('mbody').innerHTML = `
    <div class="surebet-alert">⚡ +${profit}% garantizado · S/100 → S/${Number(sb.guaranteedReturn||0).toFixed(2)}</div>
    <div class="modal-match">${sb.teams?.home||'?'} vs ${sb.teams?.away||'?'}</div>
    <div class="modal-sub">${sb.sport||'Fútbol'} · ${sb.type||'3-way'} · Encontrado ${new Date(sb.foundAt||Date.now()).toLocaleTimeString('es-PE')}</div>
    <div class="calc-controls">
      <div class="calc-total-wrap">
        <span class="calc-total-label">S/</span>
        <input class="calc-total-input" id="mod-total" type="number" value="100" min="1" oninput="recalcMod(${JSON.stringify(odds)})"/>
      </div>
      <button class="round-btn" onclick="roundMod(${JSON.stringify(odds)})">Redondear</button>
    </div>
    <div class="calc-header">
      <div>Casa · resultado</div><div>Cuota</div><div>Stake S/</div><div>Retorno</div>
    </div>
    ${bets.map((b,i) => `<div class="calc-row">
      <div>
        <div class="calc-house">${b.bookmaker||'?'}</div>
        <div class="calc-outcome">${OUTCOMES[b.outcome]||b.outcome}</div>
      </div>
      <div class="calc-odd">${odds[i].toFixed(2)}</div>
      <input class="calc-stake-input" id="mod-s${i}" type="number" value="${stakes0[i]}" oninput="manualMod(${i},${JSON.stringify(odds)})"/>
      <div id="mod-r${i}" style="font-size:13px;font-family:'JetBrains Mono',monospace;color:var(--text2)">${(odds[i]*stakes0[i]).toFixed(2)}</div>
    </div>`).join('')}
    <div class="calc-footer">
      <div style="font-size:11px;font-weight:700;color:var(--text3)">Total apostado</div>
      <div></div>
      <div id="mod-total-show" style="font-size:13px;font-family:'JetBrains Mono',monospace;color:var(--text2)">S/${total.toFixed(2)}</div>
      <div class="calc-profit pos" id="mod-net">+S/${(Math.min(...odds.map((o,i)=>o*stakes0[i]))-total).toFixed(2)}</div>
    </div>`;
  document.getElementById('mbg').classList.add('open');
}

function recalcMod(odds) {
  const total = parseFloat(document.getElementById('mod-total').value)||100;
  const inv = odds.reduce((s,o)=>s+1/o,0);
  const stakes = odds.map(o=>parseFloat((1/o/inv*total).toFixed(2)));
  const returns = odds.map((o,i)=>o*stakes[i]);
  odds.forEach((o,i)=>{
    const s=document.getElementById('mod-s'+i); if(s) s.value=stakes[i];
    const r=document.getElementById('mod-r'+i); if(r) r.textContent=returns[i].toFixed(2);
  });
  const ts=document.getElementById('mod-total-show'); if(ts) ts.textContent='S/'+total.toFixed(2);
  const net=Math.min(...returns)-total;
  const ne=document.getElementById('mod-net');
  if(ne){ne.textContent=(net>=0?'+':'')+'S/'+Math.abs(net).toFixed(2);ne.className='calc-profit '+(net>=0?'pos':'neg');}
}

function manualMod(idx,odds) {
  const stake=parseFloat(document.getElementById('mod-s'+idx).value)||0;
  const inv=odds.reduce((s,o)=>s+1/o,0);
  const implied=stake/(1/odds[idx]/inv);
  const te=document.getElementById('mod-total'); if(te) te.value=implied.toFixed(2);
  recalcMod(odds);
}

function roundMod(odds) {
  const te=document.getElementById('mod-total');
  te.value=Math.round(parseFloat(te.value)||100);
  recalcMod(odds);
}

function closeMod() { document.getElementById('mbg').classList.remove('open'); }

// ── HELPERS ───────────────────────────────────────────────────────────────────
function showMsg(ico, title, sub) {
  document.getElementById('main-list').innerHTML = `<div class="empty-wrap"><div class="empty-ico">${ico}</div><div class="empty-t">${title}</div><div class="empty-s">${sub}</div></div>`;
}
</script>
</body>
</html>
